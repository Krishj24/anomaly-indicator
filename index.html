<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Anomaly Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0d1117;
    --border:    #1c2530;
    --accent:    #f0a500;
    --accent2:   #00d4aa;
    --danger:    #ff4d6d;
    --muted:     #4a5568;
    --text:      #e2e8f0;
    --textdim:   #718096;
    --confirmed: #00d4aa;
    --likely:    #f0a500;
    --unclear:   #a78bfa;
    --technical: #60a5fa;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
    display: inline-block;
    margin-right: 8px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .header-right {
    font-size: 11px;
    color: var(--textdim);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 61px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-row: 1 / 3;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--textdim);
    margin-bottom: 14px;
  }

  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 10px;
    color: var(--textdim);
    margin-bottom: 5px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  select, input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  .btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { background: #ffbe30; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 8px;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); background: transparent; }

  /* ── ANOMALY LIST ── */
  .anomaly-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .anomaly-list::-webkit-scrollbar { width: 4px; }
  .anomaly-list::-webkit-scrollbar-track { background: var(--surface); }
  .anomaly-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .anomaly-list-header {
    padding: 14px 20px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--textdim);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  .anomaly-count {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .anomaly-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .anomaly-item:hover { background: rgba(240,165,0,0.05); }
  .anomaly-item.active { background: rgba(240,165,0,0.08); border-left: 2px solid var(--accent); }
  .anomaly-item.high-conviction::before {
    content: '⚡';
    position: absolute;
    right: 14px;
    top: 14px;
    font-size: 12px;
  }

  .anomaly-time {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .anomaly-triggers {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .trigger-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .trigger-badge.VOL_SPIKE    { background: rgba(240,165,0,0.15); color: var(--accent); }
  .trigger-badge.PRICE_SHOCK  { background: rgba(255,77,109,0.15); color: var(--danger); }
  .trigger-badge.GAP_UP       { background: rgba(0,212,170,0.15); color: var(--accent2); }
  .trigger-badge.GAP_DOWN     { background: rgba(255,77,109,0.15); color: var(--danger); }
  .trigger-badge.MOMENTUM_BULL{ background: rgba(0,212,170,0.15); color: var(--accent2); }
  .trigger-badge.MOMENTUM_BEAR{ background: rgba(255,77,109,0.15); color: var(--danger); }

  .anomaly-price {
    font-size: 11px;
    color: var(--textdim);
    margin-top: 4px;
  }

  /* ── MAIN PANEL ── */
  .main-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── CHART AREA ── */
  .chart-area {
    flex: 1;
    position: relative;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }

  #chart {
    width: 100%;
    height: 100%;
  }

  .chart-toolbar {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .toolbar-badge {
    background: rgba(13,17,23,0.85);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }

  .toolbar-badge.symbol { color: var(--accent); font-weight: 700; font-family: var(--sans); }

  .chart-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .chart-empty-icon { font-size: 48px; opacity: 0.3; }
  .chart-empty-text { font-size: 13px; color: var(--textdim); }

  /* ── INTEL PANEL ── */
  .intel-panel {
    height: 280px;
    overflow-y: auto;
    background: var(--surface);
  }
  .intel-panel::-webkit-scrollbar { width: 4px; }
  .intel-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .intel-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--textdim);
    font-size: 12px;
  }

  .intel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 5;
  }

  .intel-header h3 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
  }

  .confidence-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .conf-CONFIRMED { background: rgba(0,212,170,0.15); color: var(--confirmed); border: 1px solid rgba(0,212,170,0.3); }
  .conf-LIKELY    { background: rgba(240,165,0,0.15);  color: var(--likely);    border: 1px solid rgba(240,165,0,0.3); }
  .conf-UNCLEAR   { background: rgba(167,139,250,0.15);color: var(--unclear);   border: 1px solid rgba(167,139,250,0.3); }
  .conf-TECHNICAL { background: rgba(96,165,250,0.15); color: var(--technical); border: 1px solid rgba(96,165,250,0.3); }

  .intel-body {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .intel-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }

  .intel-card h4 {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--textdim);
    margin-bottom: 8px;
  }

  .intel-card p {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }

  .intel-card.full { grid-column: 1 / -1; }

  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    border-left: 3px solid var(--border);
    transition: border-color 0.2s;
  }
  .news-item:hover { border-left-color: var(--accent); }
  .news-item.tier-1 { border-left-color: var(--accent2); }
  .news-item.tier-2 { border-left-color: var(--accent); }

  .news-title {
    font-size: 12px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .news-meta {
    font-size: 10px;
    color: var(--textdim);
    display: flex;
    gap: 10px;
  }
  .news-source { color: var(--accent2); font-weight: 700; }

  /* ── MANUAL LOOKUP ── */
  .manual-lookup {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(240,165,0,0.03);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .manual-lookup .form-group { margin: 0; flex: 1; }

  /* ── LOADING ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,12,16,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 50;
    backdrop-filter: blur(2px);
    display: none;
  }
  .loading-overlay.active { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 12px; color: var(--textdim); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 18px;
    font-size: 12px;
    border-radius: 4px;
    z-index: 9998;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--danger); }

  /* ── MANUAL TIMESTAMP ── */
  .manual-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .manual-section h3 {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--textdim);
    margin-bottom: 12px;
    font-family: var(--sans);
    font-weight: 600;
  }
  .manual-row { display: flex; gap: 8px; align-items: flex-end; }
  .manual-row .form-group { flex: 1; margin: 0; }
  .manual-row .btn { width: auto; padding: 8px 14px; font-size: 11px; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="logo">ANOMALY<span>INTEL</span></div>
  <div class="header-right">
    <span><span class="status-dot"></span>LIVE</span>
    <span id="headerTime"></span>
  </div>
</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <h3>Instrument</h3>
      <div class="form-group">
        <label>Symbol</label>
        <select id="symbolSelect">
          <optgroup label="Indian">
            <option value="^NSEI">Nifty 50</option>
            <option value="^NSEBANK">Bank Nifty</option>
            <option value="GC=F">GIFT Nifty (Gold proxy)</option>
          </optgroup>
          <optgroup label="US">
            <option value="^GSPC">S&P 500</option>
            <option value="^IXIC">Nasdaq</option>
          </optgroup>
          <optgroup label="Commodities">
            <option value="CL=F">Crude Oil WTI</option>
            <option value="BZ=F">Brent Crude</option>
          </optgroup>
          <optgroup label="Forex">
            <option value="USDINR=X">USD/INR</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label>Timeframe</label>
        <select id="intervalSelect">
          <option value="5m">5 Minutes</option>
          <option value="15m">15 Minutes</option>
          <option value="1h" selected>1 Hour</option>
          <option value="1d">Daily</option>
        </select>
      </div>
      <div class="form-group">
        <label>Range</label>
        <select id="rangeSelect">
          <option value="5d">5 Days</option>
          <option value="1mo" selected>1 Month</option>
          <option value="3mo">3 Months</option>
          <option value="6mo">6 Months</option>
        </select>
      </div>

      <div class="form-group" style="margin-top:14px">
        <label>Vol Spike Multiplier</label>
        <input type="number" id="volMult" value="2.5" step="0.1" min="1.5" max="5"/>
      </div>
      <div class="form-group">
        <label>ATR Shock Multiplier</label>
        <input type="number" id="atrMult" value="2.0" step="0.1" min="1.0" max="5"/>
      </div>
      <div class="form-group">
        <label>Min Gap %</label>
        <input type="number" id="gapThresh" value="0.5" step="0.1" min="0.1" max="5"/>
      </div>

      <button class="btn" id="loadBtn" onclick="loadChart()">LOAD &amp; DETECT</button>
    </div>

    <!-- Manual Timestamp -->
    <div class="manual-section">
      <h3>Manual Lookup</h3>
      <p style="font-size:10px;color:var(--textdim);margin-bottom:10px;line-height:1.5">Paste a Unix timestamp from TradingView to look up news for that exact moment.</p>
      <div class="manual-row">
        <div class="form-group">
          <label>Unix Timestamp</label>
          <input type="number" id="manualTs" placeholder="e.g. 1711440000"/>
        </div>
        <button class="btn" style="width:auto;padding:8px 12px;font-size:11px" onclick="manualLookup()">GO</button>
      </div>
    </div>

    <!-- Anomaly List -->
    <div class="anomaly-list-header">
      <span>ANOMALIES</span>
      <span class="anomaly-count" id="anomalyCount">0</span>
    </div>
    <div class="anomaly-list" id="anomalyList">
      <div style="padding:20px;font-size:11px;color:var(--textdim);text-align:center;line-height:1.8">
        Load a chart to<br/>detect anomalies
      </div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main-panel">

    <!-- Chart -->
    <div class="chart-area">
      <div id="chart"></div>
      <div class="chart-toolbar" id="chartToolbar" style="display:none">
        <div class="toolbar-badge symbol" id="toolbarSymbol"></div>
        <div class="toolbar-badge" id="toolbarInterval"></div>
      </div>
      <div class="chart-empty" id="chartEmpty">
        <div class="chart-empty-icon">📈</div>
        <div class="chart-empty-text">Select an instrument and click LOAD &amp; DETECT</div>
      </div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Fetching price data...</div>
      </div>
    </div>

    <!-- Intel Panel -->
    <div class="intel-panel" id="intelPanel">
      <div class="intel-empty">← Select an anomaly from the sidebar to investigate</div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API = window.location.origin;

// ─── STATE ────────────────────────────────────────────────────────────────────
let chartInstance  = null;
let candleSeries   = null;
let markerSeries   = null;
let allCandles     = [];
let allAnomalies   = [];
let activeAnomaly  = null;
let currentSymbol  = '';

// ─── HEADER CLOCK ─────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('headerTime').textContent =
    new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false }) + ' IST';
}, 1000);

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type === 'error' ? 'error' : ''} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── LOADING ──────────────────────────────────────────────────────────────────
function setLoading(show, text = 'Loading...') {
  const el = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = text;
  el.classList.toggle('active', show);
  document.getElementById('loadBtn').disabled = show;
}

// ─── INIT CHART ───────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart');
  if (chartInstance) { chartInstance.remove(); chartInstance = null; }

  chartInstance = LightweightCharts.createChart(container, {
    layout: {
      background: { color: '#080c10' },
      textColor:  '#718096'
    },
    grid: {
      vertLines: { color: '#1c2530' },
      horzLines: { color: '#1c2530' }
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#4a5568', style: 1 },
      horzLine: { color: '#4a5568', style: 1 }
    },
    rightPriceScale: { borderColor: '#1c2530' },
    timeScale: { borderColor: '#1c2530', timeVisible: true, secondsVisible: false }
  });

  new ResizeObserver(() => {
    chartInstance.applyOptions({
      width:  container.clientWidth,
      height: container.clientHeight
    });
  }).observe(container);

  chartInstance.applyOptions({ width: container.clientWidth, height: container.clientHeight });

  candleSeries = chartInstance.addCandlestickSeries({
    upColor:        '#00d4aa',
    downColor:      '#ff4d6d',
    borderUpColor:  '#00d4aa',
    borderDownColor:'#ff4d6d',
    wickUpColor:    '#00d4aa',
    wickDownColor:  '#ff4d6d'
  });
}

// ─── LOAD CHART ───────────────────────────────────────────────────────────────
async function loadChart() {
  const symbol   = document.getElementById('symbolSelect').value;
  const interval = document.getElementById('intervalSelect').value;
  const range    = document.getElementById('rangeSelect').value;
  currentSymbol  = symbol;

  setLoading(true, 'Fetching price data...');
  document.getElementById('chartEmpty').style.display = 'none';

  try {
    // 1. Fetch OHLCV
    const ohlcvResp = await fetch(`${API}/api/ohlcv?symbol=${encodeURIComponent(symbol)}&interval=${interval}&range=${range}`);
    const ohlcvData = await ohlcvResp.json();
    if (ohlcvData.error) throw new Error(ohlcvData.error);

    allCandles = ohlcvData.candles;

    // 2. Init & populate chart
    initChart();
    candleSeries.setData(allCandles.map(c => ({
      time:  c.time,
      open:  c.open,
      high:  c.high,
      low:   c.low,
      close: c.close
    })));

    // Toolbar
    document.getElementById('chartToolbar').style.display = 'flex';
    document.getElementById('toolbarSymbol').textContent  = symbol;
    document.getElementById('toolbarInterval').textContent = interval.toUpperCase();

    setLoading(true, 'Running anomaly detection...');

    // 3. Detect anomalies
    const detectResp = await fetch(`${API}/api/detect`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        candles:       allCandles,
        volMultiplier: +document.getElementById('volMult').value,
        atrMultiplier: +document.getElementById('atrMult').value,
        gapThreshold:  +document.getElementById('gapThresh').value
      })
    });
    const detectData = await detectResp.json();
    allAnomalies = detectData.anomalies || [];

    // 4. Place markers on chart
    const markers = allAnomalies.map(a => ({
      time:     a.time,
      position: a.candle.close >= a.candle.open ? 'aboveBar' : 'belowBar',
      color:    a.highConviction ? '#f0a500' : '#00d4aa',
      shape:    a.highConviction ? 'arrowDown' : 'circle',
      text:     a.highConviction ? `⚡ ${a.score}` : '●'
    }));
    candleSeries.setMarkers(markers);

    // 5. Render sidebar list
    renderAnomalyList();

    toast(`${allAnomalies.length} anomalies detected`, 'info');
  } catch (err) {
    toast(err.message, 'error');
    document.getElementById('chartEmpty').style.display = 'flex';
  } finally {
    setLoading(false);
  }
}

// ─── RENDER ANOMALY LIST ──────────────────────────────────────────────────────
function renderAnomalyList() {
  const list = document.getElementById('anomalyList');
  document.getElementById('anomalyCount').textContent = allAnomalies.length;

  if (!allAnomalies.length) {
    list.innerHTML = '<div style="padding:20px;font-size:11px;color:var(--textdim);text-align:center">No anomalies found.<br/>Try lowering multipliers.</div>';
    return;
  }

  list.innerHTML = [...allAnomalies].reverse().map((a, i) => {
    const dt = new Date(a.time * 1000);
    const timeStr = dt.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
    const pct = (((a.candle.close - a.candle.open) / a.candle.open) * 100).toFixed(2);
    const pctColor = pct >= 0 ? 'var(--accent2)' : 'var(--danger)';

    return `<div class="anomaly-item ${a.highConviction ? 'high-conviction' : ''}" onclick="selectAnomaly(${allAnomalies.length - 1 - i})" id="anomaly-item-${allAnomalies.length - 1 - i}">
      <div class="anomaly-time">${timeStr}</div>
      <div class="anomaly-price">Close: <b>${a.candle.close}</b> &nbsp;<span style="color:${pctColor}">${pct >= 0 ? '+' : ''}${pct}%</span></div>
      <div class="anomaly-triggers">
        ${a.triggers.map(t => `<span class="trigger-badge ${t.type}">${t.type.replace('_', ' ')}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── SELECT ANOMALY ───────────────────────────────────────────────────────────
async function selectAnomaly(idx) {
  activeAnomaly = allAnomalies[idx];

  // Highlight in list
  document.querySelectorAll('.anomaly-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`anomaly-item-${idx}`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  // Scroll chart to that candle
  chartInstance?.timeScale().scrollToPosition(0, false);
  chartInstance?.timeScale().setVisibleRange({
    from: activeAnomaly.time - 3600 * 12,
    to:   activeAnomaly.time + 3600 * 12
  });

  // Show loading state in intel panel
  document.getElementById('intelPanel').innerHTML = `
    <div class="intel-empty">
      <div style="text-align:center">
        <div class="spinner" style="margin:0 auto 12px"></div>
        <div style="font-size:11px;color:var(--textdim)">Fetching news &amp; analysing...</div>
      </div>
    </div>`;

  await investigateAnomaly(activeAnomaly);
}

// ─── INVESTIGATE ANOMALY ──────────────────────────────────────────────────────
async function investigateAnomaly(anomaly) {
  try {
    // Build keyword query from symbol
    const kwMap = {
      '^NSEI':   'Nifty OR RBI OR SEBI OR Indian market',
      '^NSEBANK':'BankNifty OR RBI OR interest rate India',
      'GC=F':    'gold OR commodity OR Fed OR dollar',
      '^GSPC':   'S&P 500 OR Fed OR Federal Reserve OR CPI',
      '^IXIC':   'Nasdaq OR Fed OR tech stocks',
      'CL=F':    'crude oil OR OPEC OR EIA OR oil',
      'BZ=F':    'Brent crude OR OPEC OR oil',
      'USDINR=X':'USD INR OR rupee OR RBI OR dollar India'
    };
    const query = kwMap[currentSymbol] || currentSymbol;

    const from = new Date((anomaly.time - 7200) * 1000).toISOString();
    const to   = new Date((anomaly.time + 1800) * 1000).toISOString();

    // Fetch news in parallel
    const [gnewsResp, reutersResp] = await Promise.allSettled([
      fetch(`${API}/api/news?query=${encodeURIComponent(query)}&from=${from}&to=${to}`).then(r => r.json()),
      fetch(`${API}/api/reuters`).then(r => r.json())
    ]);

    let articles = [];
    if (gnewsResp.status === 'fulfilled' && gnewsResp.value.articles) {
      articles.push(...gnewsResp.value.articles.map(a => ({ ...a, source: a.source?.name || 'GNews', tier: 2 })));
    }
    if (reutersResp.status === 'fulfilled' && reutersResp.value.articles) {
      articles.push(...reutersResp.value.articles.slice(0, 8).map(a => ({ ...a, tier: 1 })));
    }

    // Groq analysis
    const analysisResp = await fetch(`${API}/api/analyse`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ anomaly, newsArticles: articles, symbol: currentSymbol })
    });
    const analysis = await analysisResp.json();

    renderIntelPanel(anomaly, articles, analysis);
  } catch (err) {
    renderIntelPanel(anomaly, [], { probableCause: 'Analysis failed: ' + err.message, confidence: 'UNCLEAR' });
  }
}

// ─── RENDER INTEL PANEL ───────────────────────────────────────────────────────
function renderIntelPanel(anomaly, articles, analysis) {
  const dt = new Date(anomaly.time * 1000);
  const timeStr = dt.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short' });
  const triggersText = anomaly.triggers.map(t => t.detail).join(' · ');
  const conf = analysis.confidence || 'UNCLEAR';

  const newsHtml = articles.length
    ? articles.slice(0, 8).map(a => {
        const pubStr = a.publishedAt ? new Date(a.publishedAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'short', timeStyle: 'short' }) : (a.pubDate || '');
        const link = a.url || a.link || '#';
        return `<div class="news-item tier-${a.tier || 2}">
          <div class="news-title"><a href="${link}" target="_blank" style="color:inherit;text-decoration:none">${a.title}</a></div>
          <div class="news-meta">
            <span class="news-source">${a.source}</span>
            <span>${pubStr}</span>
          </div>
        </div>`;
      }).join('')
    : '<div style="font-size:11px;color:var(--textdim);padding:10px 0">No news articles found for this time window.</div>';

  document.getElementById('intelPanel').innerHTML = `
    <div class="intel-header">
      <h3>ANOMALY INTEL — ${timeStr}</h3>
      <span class="confidence-badge conf-${conf}">${conf}</span>
      ${analysis.marketType ? `<span style="font-size:10px;color:var(--textdim)">${analysis.marketType.toUpperCase()}</span>` : ''}
    </div>
    <div class="intel-body">
      <div class="intel-card">
        <h4>Probable Cause</h4>
        <p>${analysis.probableCause || '—'}</p>
      </div>
      <div class="intel-card">
        <h4>Trader Takeaway</h4>
        <p>${analysis.actionableNote || '—'}</p>
        ${analysis.keyHeadline ? `<p style="margin-top:8px;font-size:10px;color:var(--textdim);font-style:italic">"${analysis.keyHeadline}"</p>` : ''}
      </div>
      <div class="intel-card">
        <h4>Triggers Detected</h4>
        <p style="font-size:11px;color:var(--textdim)">${triggersText}</p>
      </div>
      <div class="intel-card">
        <h4>Confidence Reason</h4>
        <p style="font-size:11px">${analysis.confidenceReason || '—'}</p>
      </div>
      <div class="intel-card full">
        <h4>News Sources (${articles.length} found · teal border = Reuters Tier 1 · amber = GNews Tier 2)</h4>
        <div class="news-list">${newsHtml}</div>
      </div>
    </div>`;
}

// ─── MANUAL TIMESTAMP LOOKUP ──────────────────────────────────────────────────
async function manualLookup() {
  const ts = document.getElementById('manualTs').value;
  if (!ts) return toast('Enter a Unix timestamp', 'error');
  if (!currentSymbol) return toast('Load a chart first', 'error');

  document.getElementById('intelPanel').innerHTML = `
    <div class="intel-empty">
      <div style="text-align:center">
        <div class="spinner" style="margin:0 auto 12px"></div>
        <div style="font-size:11px;color:var(--textdim)">Looking up timestamp...</div>
      </div>
    </div>`;

  try {
    const resp = await fetch(`${API}/api/manual-lookup?symbol=${encodeURIComponent(currentSymbol)}&timestamp=${ts}`);
    const data = await resp.json();
    const fakeAnomaly = {
      time:    parseInt(ts),
      triggers:[{ type: 'MANUAL', detail: 'Manual timestamp lookup' }],
      candle:  { open: 0, high: 0, low: 0, close: 0, volume: 0 },
      score:   1,
      highConviction: false
    };
    const analysisResp = await fetch(`${API}/api/analyse`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ anomaly: fakeAnomaly, newsArticles: data.articles || [], symbol: currentSymbol })
    });
    const analysis = await analysisResp.json();
    renderIntelPanel(fakeAnomaly, data.articles || [], analysis);
    toast('Manual lookup complete', 'info');
  } catch (err) {
    toast(err.message, 'error');
  }
}
</script>
